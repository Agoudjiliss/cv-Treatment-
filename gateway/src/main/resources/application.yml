server:
  port: 8080

spring:
  application:
    name: cv-gateway
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:cvuser}
    password: ${RABBITMQ_PASSWORD:cvpass}
  retry:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics

cv:
  rabbit:
    parse-queue: ${CV_PARSE_QUEUE:cv_parse_queue}
    result-queue: ${CV_RESULT_QUEUE:cv_result_queue}
    dlq-queue: ${CV_DLQ_QUEUE:cv_parse_dlq}
    exchange: ${CV_EXCHANGE:cv.exchange}
  retry:
    max-attempts: ${CV_RETRY_MAX_ATTEMPTS:3}
    initial-interval-ms: ${CV_RETRY_INITIAL_INTERVAL_MS:500}
    multiplier: ${CV_RETRY_MULTIPLIER:2.0}
    max-interval-ms: ${CV_RETRY_MAX_INTERVAL_MS:5000}
  parse:
    timeout-seconds: ${CV_PARSE_TIMEOUT_SECONDS:180}
  score:
    top-k: 5
  index:
    enabled: ${ENABLE_CV_INDEX:true}
    endpoint: ${ELASTICSEARCH_URL:http://elasticsearch:9200}
    index-name: ${CV_INDEX_NAME:cv-index}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
